services:
  - type: web
    name: van-sales-v3
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: van-sales-v3-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.7

databases:
  - name: van-sales-v3-db
    plan: free
