{% extends 'base.html' %}{% block title %}{{ 'Edit' if driver else 'Add' }} Driver{% endblock %}{% block content %}
<div class="page-header"><h1 class="page-title">{{ 'Edit' if driver else 'Add' }} Driver</h1></div>
<div class="row justify-content-center"><div class="col-md-6">
<form method="POST"><div class="card"><div class="card-body">
  <div class="mb-3"><label class="form-label">Full Name *</label><input type="text" name="name" class="form-control" value="{{ driver.name if driver else '' }}" required></div>
  <div class="mb-3"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ driver.phone if driver else '' }}"></div>
  <div class="mb-3"><label class="form-label">License Number</label><input type="text" name="license_number" class="form-control" value="{{ driver.license_number if driver else '' }}"></div>
  <div class="mb-3"><label class="form-label">Status</label><select name="status" class="form-select"><option value="active" {{ 'selected' if not driver or driver.status=='active' }}>Active</option><option value="inactive" {{ 'selected' if driver and driver.status=='inactive' }}>Inactive</option></select></div>
</div><div class="card-footer d-flex gap-2">
  <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Save</button>
  <a href="{{ url_for('drivers.index') }}" class="btn btn-outline-secondary">Cancel</a>
</div></div></form>
</div></div>
{% endblock %}
