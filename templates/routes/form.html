{% extends 'base.html' %}{% block title %}{{ 'Edit' if route else 'Add' }} Route{% endblock %}{% block content %}
<div class="page-header"><h1 class="page-title">{{ 'Edit' if route else 'Add' }} Route</h1></div>
<div class="row justify-content-center"><div class="col-md-6">
<form method="POST"><div class="card"><div class="card-body">
  <div class="mb-3"><label class="form-label">Route Name *</label><input type="text" name="route_name" class="form-control" value="{{ route.route_name if route else '' }}" required></div>
  <div class="mb-3"><label class="form-label">Area</label><input type="text" name="area" class="form-control" placeholder="e.g. Accra Central" value="{{ route.area if route else '' }}"></div>
  <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2">{{ route.description if route else '' }}</textarea></div>
  <div class="mb-3"><label class="form-label">Status</label><select name="status" class="form-select"><option value="active" {{ 'selected' if not route or route.status=='active' }}>Active</option><option value="inactive" {{ 'selected' if route and route.status=='inactive' }}>Inactive</option></select></div>
</div><div class="card-footer d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Save</button><a href="{{ url_for('routes.index') }}" class="btn btn-outline-secondary">Cancel</a></div></div></form>
</div></div>{% endblock %}
