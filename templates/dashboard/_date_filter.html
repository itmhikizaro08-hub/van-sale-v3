<form method="GET" class="d-flex align-items-center gap-2">
  <input type="date" name="date" class="form-control form-control-sm" style="width:auto"
         value="{{ dashboard_date.isoformat() }}" max="{{ real_today.isoformat() }}"
         onchange="this.form.submit()">
  {% if not is_today %}
  <a href="{{ url_for('dashboard.index') }}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-rotate-left me-1"></i>Today</a>
  {% endif %}
</form>
