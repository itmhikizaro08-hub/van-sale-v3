{% extends 'base.html' %}{% block title %}Change Password{% endblock %}{% block content %}
<div class="page-header"><h1 class="page-title">Change Password</h1></div>
<div class="row justify-content-center"><div class="col-md-5">
<form method="POST"><div class="card"><div class="card-body">
  <div class="mb-3"><label class="form-label">Current Password *</label><input type="password" name="current_password" class="form-control" required></div>
  <div class="mb-3"><label class="form-label">New Password *</label><input type="password" name="new_password" class="form-control" required minlength="6"></div>
  <div class="mb-3"><label class="form-label">Confirm New Password *</label><input type="password" name="confirm_password" class="form-control" required minlength="6"></div>
</div><div class="card-footer d-flex gap-2">
  <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Change Password</button>
  <a href="{{ url_for('auth.profile') }}" class="btn btn-outline-secondary">Cancel</a>
</div></div></form>
</div></div>
{% endblock %}
