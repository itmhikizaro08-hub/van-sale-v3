<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Van Sales V3 ERP</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#2563EB">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-180.png') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;min-height:100vh;background:#0f172a;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .bg-blobs{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.25}
    .blob-1{width:600px;height:600px;background:#2563EB;top:-200px;left:-200px;animation:float 8s ease-in-out infinite}
    .blob-2{width:400px;height:400px;background:#7c3aed;bottom:-100px;right:-100px;animation:float 10s ease-in-out infinite reverse}
    .blob-3{width:300px;height:300px;background:#0891b2;top:50%;left:60%;animation:float 7s ease-in-out infinite 2s}
    @keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-30px) scale(1.05)}}

    .login-card{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
    .card{background:rgba(30,41,59,.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
    .brand-logo{width:56px;height:56px;background:linear-gradient(135deg,#2563EB,#7c3aed);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin:0 auto 20px;box-shadow:0 8px 24px rgba(37,99,235,.4)}
    h1{font-size:26px;font-weight:800;color:#f1f5f9;text-align:center;margin-bottom:4px}
    .subtitle{text-align:center;color:#64748b;font-size:14px;margin-bottom:32px}

    .form-label{font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:6px}
    .input-group-text{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#64748b;border-right:none}
    .form-control{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-left:none;color:#f1f5f9;font-size:14px;padding:10px 12px}
    .form-control:focus{background:rgba(255,255,255,.08);border-color:#2563EB;box-shadow:none;color:#f1f5f9}
    .form-control::placeholder{color:#475569}

    .btn-login{width:100%;background:linear-gradient(135deg,#2563EB,#7c3aed);border:none;color:#fff;font-weight:600;font-size:15px;padding:12px;border-radius:10px;transition:opacity .2s,transform .1s;cursor:pointer;margin-top:8px}
    .btn-login:hover{opacity:.9;transform:translateY(-1px)}
    .btn-login:active{transform:translateY(0)}

    .alert{border-radius:10px;font-size:13.5px;border:none;padding:10px 14px}
    .alert-danger{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
    .alert-success{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
    .alert-info{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}

    .form-check-input{background-color:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
    .form-check-input:checked{background-color:#2563EB;border-color:#2563EB}
    .form-check-label{font-size:13px;color:#94a3b8}

    .default-creds{margin-top:20px;background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.2);border-radius:10px;padding:12px 16px;font-size:12.5px;color:#93c5fd}
    .default-creds b{color:#60a5fa}
  </style>
</head>
<body>
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="login-card">
  <div class="card">
    <div class="brand-logo"><i class="fa-solid fa-truck-fast"></i></div>
    <h1>Van Sales V3</h1>
    <p class="subtitle">ERP System — Sign in to continue</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="alert alert-{{ category }} mb-3">
        <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-triangle' }} me-2"></i>{{ message }}
      </div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username or Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user fa-sm"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock fa-sm"></i></span>
          <input type="password" name="password" id="passwordField" class="form-control" placeholder="Enter password" required>
          <button type="button" class="input-group-text" style="border-left:none;cursor:pointer" onclick="togglePwd()">
            <i class="fas fa-eye fa-sm" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <div class="mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember_me" id="rememberMe">
          <label class="form-check-label" for="rememberMe">Remember me for 30 days</label>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <div class="default-creds">
      <i class="fas fa-info-circle me-1"></i>
      Default credentials: <b>admin</b> / <b>admin123</b>
    </div>
  </div>
</div>

<script>
function togglePwd() {
  const f = document.getElementById('passwordField');
  const i = document.getElementById('eyeIcon');
  if (f.type === 'password') { f.type = 'text'; i.className = 'fas fa-eye-slash fa-sm'; }
  else { f.type = 'password'; i.className = 'fas fa-eye fa-sm'; }
}
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
