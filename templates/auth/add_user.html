{% extends 'base.html' %}{% block title %}Add User{% endblock %}{% block content %}
<div class="page-header"><h1 class="page-title">Add User</h1></div>
<div class="row justify-content-center"><div class="col-md-6">
<form method="POST"><div class="card"><div class="card-body">
  <div class="mb-3"><label class="form-label">Full Name *</label><input type="text" name="full_name" class="form-control" required></div>
  <div class="mb-3"><label class="form-label">Username *</label><input type="text" name="username" class="form-control" required></div>
  <div class="mb-3"><label class="form-label">Email *</label><input type="email" name="email" class="form-control" required></div>
  <div class="mb-3"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control"></div>
  <div class="mb-3"><label class="form-label">Role *</label>
    <select name="role" class="form-select" required>
      <option value="sales_rep">Sales Representative</option>
      <option value="manager">Manager</option>
      <option value="supervisor">Supervisor</option>
      <option value="warehouse_manager">Warehouse Manager</option>
      <option value="cashier">Cashier</option>
      <option value="admin">Administrator</option>
    </select>
  </div>
  <div class="mb-3"><label class="form-label">Password *</label><input type="password" name="password" class="form-control" required minlength="6"></div>
</div><div class="card-footer d-flex gap-2">
  <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Create User</button>
  <a href="{{ url_for('auth.users') }}" class="btn btn-outline-secondary">Cancel</a>
</div></div></form>
</div></div>
{% endblock %}
