<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Add Route | {{ company_name }}</title>
  <link rel="manifest" href="{{ url_for('customers.quick_add_manifest') }}">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-180.png') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Field PWA color tokens — copied verbatim from what this page already
       used (kept separate from main.css since this is a standalone,
       installable page — see quick_add.html for the same convention). */
    :root{
      --pwa-bg: #0b1220; --pwa-bg-rgb: 11,18,32;
      --pwa-text: #f1f5f9;
      --pwa-text-heading: #f8fafc;
      --pwa-text-bright: #e2e8f0;
      --pwa-text-dim: #94a3b8;
      --pwa-text-muted: #64748b;
      --pwa-text-faint: #475569;
      --pwa-white-rgb: 255,255,255;
      --pwa-green: #16a34a; --pwa-green-rgb: 22,163,74;
      --pwa-cyan: #0891b2;
      --pwa-danger-rgb: 239,68,68; --pwa-danger-text: #fca5a5;
      --pwa-warning-rgb: 245,158,11; --pwa-warning-text: #fcd34d;
      --pwa-success-rgb: 16,185,129; --pwa-success-text: #6ee7b7;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--pwa-bg);color:var(--pwa-text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
    .bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:
      radial-gradient(500px circle at 15% 0%, rgba(var(--pwa-green-rgb),.16), transparent 60%),
      radial-gradient(500px circle at 100% 20%, rgba(8,145,178,.14), transparent 55%)}

    .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top));background:rgba(var(--pwa-bg-rgb),.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(var(--pwa-white-rgb),.06)}
    .topbar-back{color:var(--pwa-text-dim);text-decoration:none;font-size:16px;width:30px;height:30px;display:flex;align-items:center;justify-content:center}
    .topbar-name{font-size:14px;font-weight:700;color:var(--pwa-text-bright)}
    .topbar-sub{font-size:10.5px;color:var(--pwa-text-muted)}

    .content{position:relative;z-index:1;flex:1;width:100%;max-width:480px;margin:0 auto;padding:20px 16px calc(40px + env(safe-area-inset-bottom))}

    .hero{text-align:center;margin-bottom:20px}
    .hero-icon{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--pwa-green),var(--pwa-cyan));display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;margin:0 auto 12px;box-shadow:0 10px 28px rgba(var(--pwa-green-rgb),.35)}
    .hero h1{font-size:20px;font-weight:800;color:var(--pwa-text-heading);margin-bottom:2px}
    .hero p{font-size:12.5px;color:var(--pwa-text-muted)}

    .form-card{background:rgba(var(--pwa-white-rgb),.035);border:1px solid rgba(var(--pwa-white-rgb),.08);border-radius:16px;padding:16px;margin-bottom:14px}
    .form-label{font-size:12.5px;font-weight:500;color:var(--pwa-text-dim);margin-bottom:6px;display:block}
    .form-control{background:rgba(var(--pwa-white-rgb),.04);border:1px solid rgba(var(--pwa-white-rgb),.1);color:var(--pwa-text);font-size:16px;padding:11px 13px;border-radius:11px}
    .form-control:focus{background:rgba(var(--pwa-white-rgb),.07);border-color:var(--pwa-green);box-shadow:0 0 0 3px rgba(var(--pwa-green-rgb),.15);color:var(--pwa-text)}
    .form-control::placeholder{color:var(--pwa-text-faint)}

    .btn-save{width:100%;background:linear-gradient(135deg,var(--pwa-green),var(--pwa-cyan));border:none;color:#fff;font-weight:700;font-size:15px;padding:15px;border-radius:13px;box-shadow:0 10px 26px rgba(var(--pwa-green-rgb),.3)}
    .btn-save:active{transform:scale(.99)}

    .alert{border-radius:12px;font-size:13px;border:none;padding:11px 14px;margin-bottom:14px}
    .alert-danger{background:rgba(var(--pwa-danger-rgb),.15);color:var(--pwa-danger-text);border:1px solid rgba(var(--pwa-danger-rgb),.3)}
    .alert-warning{background:rgba(var(--pwa-warning-rgb),.15);color:var(--pwa-warning-text);border:1px solid rgba(var(--pwa-warning-rgb),.3)}
    .alert-success{background:rgba(var(--pwa-success-rgb),.15);color:var(--pwa-success-text);border:1px solid rgba(var(--pwa-success-rgb),.3)}
  </style>
</head>
<body>
<div class="bg-glow"></div>

<header class="topbar">
  <a href="{{ url_for('customers.quick_add_routes') }}" class="topbar-back"><i class="fas fa-arrow-left"></i></a>
  <div>
    <div class="topbar-name">Add Route</div>
    <div class="topbar-sub">{{ company_name }}</div>
  </div>
</header>

<main class="content">
  <div class="hero">
    <div class="hero-icon"><i class="fa-solid fa-route"></i></div>
    <h1>New Route</h1>
    <p>Set up a route for a new area you're covering</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'success' if category == 'success' else category }}">
      <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-triangle' }} me-2"></i>{{ message }}
    </div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-card">
      <div class="mb-3">
        <label class="form-label">Route Name *</label>
        <input type="text" name="route_name" class="form-control" placeholder="e.g. Madina - Adenta" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Area</label>
        <input type="text" name="area" class="form-control" placeholder="e.g. Greater Accra">
      </div>
      <div>
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="2" placeholder="Optional notes about this route"></textarea>
      </div>
    </div>

    <button type="submit" class="btn-save">
      <i class="fas fa-check me-2"></i>Save Route
    </button>
  </form>
</main>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
