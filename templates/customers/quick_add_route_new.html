<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Add Route | {{ company_name }}</title>
  <link rel="manifest" href="{{ url_for('customers.quick_add_manifest') }}">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-180.png') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --pwa-bg: #0a0e1a; --pwa-bg-rgb: 10,14,26;
      --pwa-text: #f1f5f9; --pwa-text-heading: #ffffff; --pwa-text-bright: #e2e8f0;
      --pwa-text-dim: #94a3b8; --pwa-text-muted: #64748b; --pwa-text-faint: #475569;
      --pwa-white-rgb: 255,255,255;
      --pwa-em: #10b981; --pwa-em-rgb: 16,185,129;
      --pwa-indigo: #6366f1; --pwa-indigo-rgb: 99,102,241;
      --pwa-danger-rgb: 239,68,68; --pwa-danger-text: #fca5a5;
      --pwa-warning-rgb: 245,158,11; --pwa-warning-text: #fcd34d;
      --pwa-success-rgb: 16,185,129; --pwa-success-text: #34d399;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--pwa-bg);color:var(--pwa-text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
    .bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:
      radial-gradient(600px circle at -5% -10%, rgba(var(--pwa-em-rgb),.20), transparent 55%),
      radial-gradient(600px circle at 110% 10%, rgba(var(--pwa-indigo-rgb),.18), transparent 55%)}

    .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:16px 20px;padding-top:calc(16px + env(safe-area-inset-top));background:rgba(var(--pwa-bg-rgb),.78);backdrop-filter:blur(20px);border-bottom:1px solid rgba(var(--pwa-white-rgb),.07)}
    .topbar-back{color:var(--pwa-text-dim);text-decoration:none;font-size:16px;width:32px;height:32px;border-radius:10px;background:rgba(var(--pwa-white-rgb),.05);display:flex;align-items:center;justify-content:center;flex:none}
    .topbar-name{font-size:14.5px;font-weight:800;color:var(--pwa-text-heading)}
    .topbar-sub{font-size:10.5px;color:var(--pwa-text-muted);font-weight:600}

    .content{position:relative;z-index:1;flex:1;width:100%;max-width:480px;margin:0 auto;padding:24px 18px calc(40px + env(safe-area-inset-bottom))}

    .hero{text-align:center;margin-bottom:26px}
    .hero-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--pwa-em),var(--pwa-indigo));display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin:0 auto 16px;box-shadow:0 14px 32px rgba(var(--pwa-em-rgb),.4)}
    .hero h1{font-size:23px;font-weight:900;color:var(--pwa-text-heading);margin-bottom:4px;letter-spacing:-.01em}
    .hero p{font-size:13px;color:var(--pwa-text-muted);font-weight:500}

    .form-card{background:rgba(var(--pwa-white-rgb),.04);border:1px solid rgba(var(--pwa-white-rgb),.08);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
    .form-label{font-size:12.5px;font-weight:600;color:var(--pwa-text-dim);margin-bottom:7px;display:block}
    .form-control{background:rgba(var(--pwa-white-rgb),.045);border:1.5px solid rgba(var(--pwa-white-rgb),.09);color:var(--pwa-text);font-size:16px;padding:12px 14px;border-radius:13px}
    .form-control:focus{background:rgba(var(--pwa-white-rgb),.08);border-color:var(--pwa-em);box-shadow:0 0 0 4px rgba(var(--pwa-em-rgb),.14);color:var(--pwa-text)}
    .form-control::placeholder{color:var(--pwa-text-faint)}

    .btn-save{width:100%;background:linear-gradient(135deg,var(--pwa-em),var(--pwa-indigo));border:none;color:#fff;font-weight:800;font-size:15.5px;padding:17px;border-radius:999px;box-shadow:0 14px 32px rgba(var(--pwa-em-rgb),.38)}
    .btn-save:active{transform:scale(.98)}

    .alert{border-radius:14px;font-size:13px;font-weight:500;border:none;padding:12px 15px;margin-bottom:14px}
    .alert-danger{background:rgba(var(--pwa-danger-rgb),.16);color:var(--pwa-danger-text);border:1px solid rgba(var(--pwa-danger-rgb),.32)}
    .alert-warning{background:rgba(var(--pwa-warning-rgb),.16);color:var(--pwa-warning-text);border:1px solid rgba(var(--pwa-warning-rgb),.32)}
    .alert-success{background:rgba(var(--pwa-success-rgb),.16);color:var(--pwa-success-text);border:1px solid rgba(var(--pwa-success-rgb),.32)}
  </style>
</head>
<body>
<div class="bg-glow"></div>

<header class="topbar">
  <a href="{{ url_for('customers.quick_add_routes') }}" class="topbar-back"><i class="fas fa-arrow-left"></i></a>
  <div>
    <div class="topbar-name">Add Route</div>
    <div class="topbar-sub">{{ company_name }}</div>
  </div>
</header>

<main class="content">
  <div class="hero">
    <div class="hero-icon"><i class="fa-solid fa-route"></i></div>
    <h1>New Route</h1>
    <p>Set up a route for a new area you're covering</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'success' if category == 'success' else category }}">
      <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-triangle' }} me-2"></i>{{ message }}
    </div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-card">
      <div class="mb-3">
        <label class="form-label">Route Name *</label>
        <input type="text" name="route_name" class="form-control" placeholder="e.g. Madina - Adenta" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Area</label>
        <input type="text" name="area" class="form-control" placeholder="e.g. Greater Accra">
      </div>
      <div>
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="2" placeholder="Optional notes about this route"></textarea>
      </div>
    </div>

    <button type="submit" class="btn-save">
      <i class="fas fa-check me-2"></i>Save Route
    </button>
  </form>
</main>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
