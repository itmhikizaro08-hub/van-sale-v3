{% extends 'base.html' %}{% block title %}{{ 'Edit' if product else 'Add' }} Product{% endblock %}{% block content %}
<div class="page-header"><h1 class="page-title">{{ 'Edit' if product else 'Add' }} Product</h1></div>
<div class="row justify-content-center"><div class="col-md-7">
<form method="POST"><div class="card"><div class="card-body">
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label">Product Name *</label><input type="text" name="product_name" class="form-control" value="{{ product.product_name if product else '' }}" required></div>
    <div class="col-md-6"><label class="form-label">Product Code *</label><input type="text" name="product_code" class="form-control" value="{{ product.product_code if product else '' }}" required></div>
    <div class="col-md-6"><label class="form-label">Category</label><select name="category_id" class="form-select"><option value="">— None —</option>{% for c in categories %}<option value="{{ c.id }}" {{ 'selected' if product and product.category_id == c.id }}>{{ c.name }}</option>{% endfor %}</select></div>
    <div class="col-md-6"><label class="form-label">Unit</label><select name="unit" class="form-select"><option value="piece">Piece</option><option value="box">Box</option><option value="pack">Pack</option><option value="kg">KG</option><option value="litre">Litre</option><option value="carton">Carton</option></select></div>
    <div class="col-md-6"><label class="form-label">Cost Price (GHS)</label><div class="input-group"><span class="input-group-text">GHS</span><input type="number" step="0.01" name="cost_price" class="form-control" value="{{ product.cost_price if product else '0.00' }}"></div></div>
    <div class="col-md-6"><label class="form-label">Selling Price (GHS) *</label><div class="input-group"><span class="input-group-text">GHS</span><input type="number" step="0.01" name="selling_price" class="form-control" value="{{ product.selling_price if product else '0.00' }}" required></div></div>
    <div class="col-md-6"><label class="form-label">Initial Stock</label><input type="number" name="stock_quantity" class="form-control" value="{{ product.stock_quantity if product else '0' }}"></div>
    <div class="col-md-6"><label class="form-label">Reorder Level</label><input type="number" name="reorder_level" class="form-control" value="{{ product.reorder_level if product else '10' }}"></div>
    <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2">{{ product.description if product else '' }}</textarea></div>
  </div>
</div><div class="card-footer d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Save Product</button><a href="{{ url_for('products.index') }}" class="btn btn-outline-secondary">Cancel</a></div></div></form>
</div></div>{% endblock %}
